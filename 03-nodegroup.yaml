AWSTemplateFormatVersion: '2010-09-09'
Description: 'EKS Node Group - Stack 3 of 5'

Parameters:
  ClusterName:
    Type: String
    Default: my-eks-cluster
    Description: Name of the EKS cluster

  Environment:
    Type: String
    Default: production
    Description: Environment name

  NodeGroupName:
    Type: String
    Default: primary-nodes
    Description: Name of the node group

  Architecture:
    Type: String
    Default: arm64
    AllowedValues:
      - arm64
      - x86_64
    Description: >-
      CPU architecture for worker nodes. Choose arm64 for Graviton (c7g, m7g, t4g)
      or x86_64 for Intel/AMD (t3, m5, c5, m6i, c6i).

  InstanceType:
    Type: String
    Default: c7g.2xlarge
    Description: >-
      EC2 instance type for nodes. Must match the selected Architecture —
      arm64: c7g.*, m7g.*, t4g.* | x86_64: t3.*, m5.*, c5.*, m6i.*, c6i.*

  DesiredCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Desired number of nodes

  MinSize:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Minimum number of nodes

  MaxSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 20
    Description: Maximum number of nodes

  DiskSize:
    Type: Number
    Default: 80
    MinValue: 20
    MaxValue: 200
    Description: Disk size in GB for nodes

  NodeGroupAZMode:
    Type: String
    Default: multi
    AllowedValues:
      - single
      - multi
    Description: 'NodeGroup AZ distribution: single=1 AZ, multi=all AZs'

  TargetAZ:
    Type: String
    Default: us-east-1a
    Description: |
      Target Availability Zone for single-AZ mode (e.g., us-east-1a, us-east-1b).
      Must be a valid AZ in the selected region. Ignored in multi-AZ mode.

Conditions:
  IsArm64: !Equals [!Ref Architecture, 'arm64']
  IsSingleAZ: !Equals [!Ref NodeGroupAZMode, 'single']
  # Conditions to match TargetAZ with available subnets
  UseSubnet1ForAZ: !Or [
    !Equals [!Ref TargetAZ, 'us-east-1a'],
    !Equals [!Ref TargetAZ, 'us-east-1d'],
    !Equals [!Ref TargetAZ, 'us-west-2a'],
    !Equals [!Ref TargetAZ, 'ap-south-1a'],
    !Equals [!Ref TargetAZ, 'eu-west-1a'],
    !Equals [!Ref TargetAZ, 'ap-southeast-1a']
  ]
  UseSubnet2ForAZ: !Or [
    !Equals [!Ref TargetAZ, 'us-east-1b'],
    !Equals [!Ref TargetAZ, 'us-east-1e'],
    !Equals [!Ref TargetAZ, 'us-west-2b'],
    !Equals [!Ref TargetAZ, 'ap-south-1b'],
    !Equals [!Ref TargetAZ, 'eu-west-1b'],
    !Equals [!Ref TargetAZ, 'ap-southeast-1b']
  ]
  UseSubnet3ForAZ: !Or [
    !Equals [!Ref TargetAZ, 'us-east-1c'],
    !Equals [!Ref TargetAZ, 'us-east-1f'],
    !Equals [!Ref TargetAZ, 'us-west-2c'],
    !Equals [!Ref TargetAZ, 'ap-south-1c'],
    !Equals [!Ref TargetAZ, 'eu-west-1c'],
    !Equals [!Ref TargetAZ, 'ap-southeast-1c']
  ]

Resources:
  #============================================
  # Node Group IAM Role
  #============================================
  NodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-nodegroup-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  #============================================
  # EKS Managed Node Group
  #============================================
  EksNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName:
        Fn::ImportValue: !Sub '${ClusterName}-ClusterName'
      NodegroupName: !Sub '${ClusterName}-${NodeGroupName}'
      NodeRole: !GetAtt NodeGroupRole.Arn
      Subnets: !If
        - IsSingleAZ
        # Single AZ: Use only the subnet matching TargetAZ
        - !If
            - UseSubnet1ForAZ
            - - Fn::ImportValue: !Sub '${ClusterName}-PrivateSubnet1Id'
            - !If
                - UseSubnet2ForAZ
                - - Fn::ImportValue: !Sub '${ClusterName}-PrivateSubnet2Id'
                - - Fn::ImportValue: !Sub '${ClusterName}-PrivateSubnet3Id'
        # Multi AZ: Use all 3 subnets
        - - Fn::ImportValue: !Sub '${ClusterName}-PrivateSubnet1Id'
          - Fn::ImportValue: !Sub '${ClusterName}-PrivateSubnet2Id'
          - Fn::ImportValue: !Sub '${ClusterName}-PrivateSubnet3Id'
      AmiType: !If [IsArm64, 'AL2023_ARM_64_STANDARD', 'AL2023_x86_64_STANDARD']
      CapacityType: ON_DEMAND
      DiskSize: !Ref DiskSize
      InstanceTypes:
        - !Ref InstanceType
      ScalingConfig:
        DesiredSize: !Ref DesiredCapacity
        MinSize: !Ref MinSize
        MaxSize: !Ref MaxSize
      UpdateConfig:
        MaxUnavailable: 1
      Labels:
        role: worker
        environment: !Ref Environment
      Tags:
        Name: !Sub '${ClusterName}-${NodeGroupName}'
        Environment: !Ref Environment

Outputs:
  NodeGroupName:
    Description: Node Group Name
    Value: !Ref EksNodeGroup

  NodeGroupArn:
    Description: Node Group ARN
    Value: !GetAtt EksNodeGroup.Arn

  NodeRoleArn:
    Description: Node IAM Role ARN
    Value: !GetAtt NodeGroupRole.Arn
